[/Script/EngineSettings.GameMapsSettings]
; 에디터 기본맵 / 게임 기본맵 / 서버 기본맵 / 트랜지션 맵
EditorStartupMap=/Game/AVaOut/Maps/LV_MainMenu
GameDefaultMap=/Game/AVaOut/Maps/LV_MainMenu
ServerDefaultMap=/Game/AVaOut/Maps/LV_Lobby
TransitionMap=/Game/AVaOut/Maps/LV_Transition.LV_Transition
GameInstanceClass=/Game/AVaOut/GameFramework/GaminInstance/BP_GameInstance.BP_GameInstance_C

; --------- 로컬 테스트 (NULL + IpNetDriver) ----------
; ➜ 이 블록을 사용하려면 주석 해제, 스팀 블록은 주석 처리
;[OnlineSubsystem]
;DefaultPlatformService=Null

;[OnlineSubsystemNull]
;bIsUsingPresence=true
;------------------------------------------------------

; --------- 스팀 테스트 (Steam + SteamSockets) ----------
; ➜ 이 블록을 사용하려면 아래 주석 해제, 로컬 블록은 주석 처리

[OnlineSubsystem]
DefaultPlatformService=Steam
bHasVoiceEnabled=true

[OnlineSubsystemSteam]
bEnabled=true
SteamDevAppId=480
bInitServerOnClient=true
bAllowP2PPacketRelay=true
bHasVoiceEnabled=true
; 샘플 레이트 설정 (24000 또는 48000 권장)
; 비트레이트 설정 (데이터 전송량을 늘려 품질 향상)
; 보이스 패킷 전송 빈도와 크기에 영향을 줍니다.
VoiceSampleRate=24000
VoiceBitrate=24000

[Voice]
bEnabled=true
; JM 음성 끊김 방지를 위함
;voice.SilenceDetectionThreshold=0.01    ; 음성 감지 임계값 (0.01 ~ 0.1 사이 권장, 낮을수록 더 민감하게 반응)
;voice.SilenceDetectionDelay=1.0         ; 소리가 임계값 이하로 떨어져도 전송을 유지하는 시간 (초 단위)
;voice.SilenceDetectionPeriod=0.1        ; 침묵을 판단하기 위해 분석하는 시간 창(Window)의 길이입니다.
;voice.MicNoiseGateThreshold=0.01        ; 노이즈 게이트 임계값 (작은 소리도 통과시키려면 낮게 설정) 0.01
;voice.MicNoiseSuppression=0             ; 에코 제거 및 노이즈 억제 비활성화 (0으로 설정)
;voice.MicEchoCancellation=0
;voice.MicInputGain=2.0                  ; 마이크 입력 증폭 (소리가 너무 작아 끊긴다면 값을 높임, 기본 1.0)
;voice.VoiceBufferDelay=0.1              ; 오디오 컴포넌트의 버퍼링을 늘려 데이터 손실로 인한 끊김 방지
; 기본값이 짧다면 0.5 ~ 1.0 정도로 늘려보세요.

[Core.Log]
LogVoiceEngine=None

;-------------------------------------------------------

