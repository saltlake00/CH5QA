;; 마이크 소리가 이 값보다 작으면 무음으로 간주하고 전송하지 않습니다. (기본값 0.08)
;; 아주 작은 소리도 잡으려면 0.01 또는 0.0으로 설정하세요.
voice.SilenceDetectionThreshold=0.01
;; 노이즈 게이트 임계값입니다. 위 설정과 함께 0.01 정도로 낮추는 것이 권장됩니다.
voice.MicNoiseGateThreshold=0.01
;; 마이크 입력 신호를 증폭합니다. 소리가 너무 작게 들릴 때 값을 높입니다. (기본값 1.0)
voice.MicInputGain=1.0
;; 소리가 임계값 이하로 떨어져도 바로 끊기지 않고 유지되는 시간(초)입니다.
voice.SilenceDetectionDelay=1.0

